<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }
    h1 { font-size: 1.8rem; color: #333; margin-bottom: 24px; }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #4f8ef7; }
    button.add-btn {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.add-btn:hover { background: #3a7de0; }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    li:last-child { border-bottom: none; }
    li input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4f8ef7; }
    li span {
      flex: 1;
      font-size: 1rem;
      color: #444;
      transition: color 0.2s;
    }
    li.done span { text-decoration: line-through; color: #aaa; }
    button.del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    button.del-btn:hover { color: #e74c3c; }
    .empty { color: #aaa; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="새 할 일을 입력하세요..." />
      <button class="add-btn" onclick="addTodo()">추가</button>
    </div>
    <ul id="todoList"></ul>
    <p class="empty" id="emptyMsg">할 일이 없습니다.</p>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todoList');
      const empty = document.getElementById('emptyMsg');
      list.innerHTML = '';
      if (todos.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      todos.forEach((t, i) => {
        const li = document.createElement('li');
        if (t.done) li.classList.add('done');
        li.innerHTML = `
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${i})" />
          <span>${escapeHtml(t.task)}</span>
          <button class="del-btn" onclick="remove(${i})">&#x2715;</button>
        `;
        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTodo() {
      const input = document.getElementById('taskInput');
      const task = input.value.trim();
      if (!task) return;
      todos.push({ task, done: false });
      input.value = '';
      save(); render();
    }

    function toggle(i) {
      todos[i].done = !todos[i].done;
      save(); render();
    }

    function remove(i) {
      todos.splice(i, 1);
      save(); render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
